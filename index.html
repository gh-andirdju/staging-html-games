<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>HTML Games</title>
    <style>
      *, *::before, *::after { box-sizing: border-box; }

      :root {
        --bg-top: #1a0e00;
        --bg-bottom: #080400;
        --accent: #f59e0b;
        --accent-rgb: 245, 158, 11;
        --panel-border: rgba(var(--accent-rgb), 0.28);
        --text-main: #fef9f0;
        --shadow: 0 14px 36px rgba(8, 3, 0, 0.48);
      }

      body {
        margin: 0;
        min-height: 100vh;
        background:
          radial-gradient(circle at top, rgba(var(--accent-rgb), 0.15), transparent 30%),
          linear-gradient(180deg, var(--bg-top), var(--bg-bottom) 62%);
        color: var(--text-main);
        font-family: "Trebuchet MS", "Arial Narrow", Arial, sans-serif;
        display: grid;
        place-items: center;
      }

      main {
        width: min(100vw, 480px);
        padding: 32px 16px;
        display: grid;
        gap: 32px;
        text-align: center;
      }

      h1 {
        margin: 0;
        font-size: clamp(28px, 8vw, 48px);
        letter-spacing: 0.06em;
        text-transform: uppercase;
        color: var(--accent);
        text-shadow: 0 0 24px rgba(var(--accent-rgb), 0.45);
      }

      ul {
        list-style: none;
        margin: 0;
        padding: 0;
        display: grid;
        gap: 14px;
      }

      li a {
        display: block;
        padding: 16px 24px;
        border: 1px solid var(--panel-border);
        border-radius: 18px;
        background: rgba(20, 10, 0, 0.9);
        box-shadow: var(--shadow);
        color: var(--text-main);
        text-decoration: none;
        font-size: 18px;
        font-weight: 700;
        letter-spacing: 0.04em;
        transition: border-color 0.15s, box-shadow 0.15s;
      }

      li a:hover,
      li a:focus-visible {
        border-color: rgba(var(--accent-rgb), 0.55);
        box-shadow: 0 0 20px rgba(var(--accent-rgb), 0.18), var(--shadow);
        outline: none;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>HTML Games</h1>
      <ul>
        <li><a href="./brickbreaker/">Brick Breaker</a></li>
        <li><a href="./tetris/">Tetris</a></li>
        <li><a href="./2048/">2048</a></li>
        <li><a href="./snake/">Snake</a></li>
        <li><a href="./asteroids/">Asteroids</a></li>
        <li><a href="./pinball/">Pinball</a></li>
        <li><a href="./space-invaders/">Space Invaders</a></li>
        <li><a href="./sokoban/">Sokoban</a></li>
        <li><a href="./pong/">Pong</a></li>
      </ul>
    </main>
  </body>
</html>
