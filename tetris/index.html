<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Tetris</title>
    <link rel="stylesheet" href="src/styles.css">
  </head>
  <body>
    <main class="game-shell">
      <header class="topbar">
        <div class="topbar-copy">
          <span class="eyebrow">Endless Marathon</span>
          <strong class="title">Tetris</strong>
        </div>
        <button id="restart" type="button">Restart</button>
      </header>

      <div class="game-area" role="region" aria-label="Game area">
        <div class="board-wrap">
          <canvas id="game" width="300" height="600" aria-label="Tetris board"></canvas>
        </div>

        <aside class="side-rail" aria-label="Game status">
          <div class="preview-box next-preview">
            <span class="preview-label">NEXT</span>
            <canvas id="next-canvas" width="50" height="34" role="img" aria-label="Next piece preview"></canvas>
          </div>
          <div class="stat-block">
            <span class="stat-label">SCORE</span>
            <strong id="score">0</strong>
          </div>
          <div class="stat-block">
            <span class="stat-label">LVL</span>
            <strong id="level">1</strong>
          </div>
          <div class="stat-block">
            <span class="stat-label">LINES</span>
            <strong id="lines">0</strong>
          </div>
          <div class="preview-box hold-preview" data-action="hold" role="button" tabindex="0" aria-label="Hold piece">
            <span class="preview-label">HOLD</span>
            <canvas id="hold-canvas" width="50" height="34" role="img" aria-label="Held piece preview"></canvas>
          </div>
          <div class="status-wrap" role="status" aria-live="polite">
            <strong id="status"></strong>
          </div>
        </aside>
      </div>

      <div class="control-deck" role="group" aria-label="Touch controls">
        <div class="dpad-cluster">
          <div class="dpad" aria-label="Directional pad">
            <div class="dpad-v-bar"></div>
            <div class="dpad-h-bar"></div>
            <button type="button" class="dpad-btn dpad-up" data-action="hard-drop" aria-label="Hard Drop">▲</button>
            <button type="button" class="dpad-btn dpad-left" data-action="left" aria-label="Left">◀</button>
            <button type="button" class="dpad-btn dpad-right" data-action="right" aria-label="Right">▶</button>
            <button type="button" class="dpad-btn dpad-down" data-action="soft-drop" aria-label="Soft Drop">▼</button>
          </div>
          <p class="cluster-label">◀▶ move · ▼ soft drop / <span class="accent-text">▲ HARD DROP</span></p>
        </div>

        <div class="rotate-area">
          <div class="rotate-cluster" aria-label="Rotation controls">
            <button type="button" class="rotate-btn ccw" data-action="rotate-ccw" aria-label="Rotate Left">↺</button>
            <button type="button" class="rotate-btn cw" data-action="rotate-cw" aria-label="Rotate Right">↻</button>
          </div>
          <p class="cluster-label">rotate left · rotate right</p>
        </div>
      </div>
    </main>
    <script src="src/game.js"></script>
  </body>
</html>
