<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Tetris</title>
    <link rel="stylesheet" href="src/styles.css">
  </head>
  <body>
    <main class="game-shell">
      <header class="topbar">
        <div class="topbar-copy">
          <span class="eyebrow">Endless Marathon</span>
          <strong class="title">Tetris</strong>
        </div>
        <button id="restart" type="button">Restart</button>
      </header>

      <section class="playfield" aria-label="Game area">
        <header class="hud" aria-label="Game status">
          <div class="stat-card">
            <span class="label">Score</span>
            <strong id="score">0</strong>
          </div>
          <div class="stat-card">
            <span class="label">Lines</span>
            <strong id="lines">0</strong>
          </div>
          <div class="stat-card">
            <span class="label">Level</span>
            <strong id="level">1</strong>
          </div>
          <div class="status-wrap">
            <span class="label">Status</span>
            <strong id="status">Playing</strong>
          </div>
        </header>

        <div class="board-wrap">
          <canvas id="game" width="300" height="600" aria-label="Tetris board"></canvas>
        </div>
      </section>

      <section class="touch-controls" aria-label="Touch controls">
        <div class="controls-header">
          <span class="control-label">Handedness</span>
          <button
            id="handedness-toggle"
            class="mode-toggle"
            type="button"
            aria-label="Switch to left-handed controls"
            aria-pressed="false"
          >
            Right-handed
          </button>
        </div>
        <div class="thumb-zone move-zone">
          <span class="control-label">Move</span>
          <div class="move-row">
            <button type="button" data-action="left">Left</button>
            <button type="button" data-action="soft-drop" aria-label="Soft Drop">Down</button>
            <button type="button" data-action="right">Right</button>
          </div>
        </div>
        <div class="thumb-zone action-zone">
          <span class="control-label">Actions</span>
          <div class="action-grid">
            <button type="button" data-action="rotate">Rotate</button>
            <button type="button" data-action="hard-drop" aria-label="Hard Drop">Drop</button>
          </div>
        </div>
      </section>
    </main>
    <script src="src/game.js"></script>
  </body>
</html>
