<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Pong</title>
    <link rel="stylesheet" href="src/styles.css">
  </head>
  <body>
    <main class="game-shell">
      <header class="hud" aria-label="Game status">
        <div class="hud-primary">
          <div class="stat-chip">
            <span class="label">Player</span>
            <strong id="player-score">0</strong>
          </div>
          <div class="stat-chip center-chip">
            <span class="label">First to 7</span>
            <strong id="status">Serving</strong>
          </div>
          <div class="stat-chip">
            <span class="label">AI</span>
            <strong id="ai-score">0</strong>
          </div>
        </div>
      </header>

      <section class="playfield">
        <canvas id="game" width="800" height="520" aria-label="Pong game area"></canvas>
      </section>

      <section class="touch-controls" aria-label="Touch controls">
        <div class="thumb-zone movement-zone">
          <span class="control-label">Player Paddle</span>
          <div class="paddle-btns">
            <button id="player-up" class="paddle-btn" aria-label="Move paddle up">▲</button>
            <button id="player-down" class="paddle-btn" aria-label="Move paddle down">▼</button>
          </div>
        </div>
        <div class="thumb-zone action-zone">
          <span class="control-label">System</span>
          <div class="action-btns">
            <button id="pause" type="button" class="action-button" aria-pressed="false">Pause</button>
            <button id="restart" type="button" class="action-button">Restart</button>
          </div>
        </div>
      </section>
    </main>

    <script src="src/game.js"></script>
  </body>
</html>
