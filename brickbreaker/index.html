<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Brickbreaker</title>
    <link rel="stylesheet" href="src/styles.css">
  </head>
  <body>
    <main class="game-shell">
      <header class="hud" aria-label="Game status">
        <div class="hud-primary">
          <div class="stat-chip">
            <span class="label">Score</span>
            <strong id="score">0</strong>
          </div>
          <div class="stat-chip">
            <span class="label">Lives</span>
            <strong id="lives">3</strong>
          </div>
          <div class="stat-chip">
            <span class="label">Level</span>
            <strong id="level">1</strong>
          </div>
        </div>
        <div class="hud-meta">
          <div class="meta-chip effects-wrap">
            <span class="label">Effects</span>
            <strong id="effects">None</strong>
          </div>
          <div class="meta-chip status-wrap">
            <span class="label">Status</span>
            <strong id="status">Playing</strong>
          </div>
        </div>
      </header>

      <section class="playfield">
        <canvas id="game" width="800" height="520" aria-label="Brickbreaker game area"></canvas>
      </section>

      <section class="touch-controls" aria-label="Touch controls">
        <div class="thumb-zone movement-zone">
          <span class="control-label">Paddle Lane</span>
          <div id="paddle-drag-lane" class="drag-lane" aria-label="Paddle drag lane">
            <span>Drag to steer</span>
          </div>
        </div>
        <div class="thumb-zone action-zone">
          <span class="control-label">System</span>
          <div class="action-btns">
            <button id="pause" type="button" class="action-button" aria-pressed="false">Pause</button>
            <button id="restart" type="button" class="action-button">Restart</button>
          </div>
          <p class="control-note">Lasers fire automatically when armed.</p>
        </div>
      </section>
    </main>

    <script src="src/game.js"></script>
  </body>
</html>
