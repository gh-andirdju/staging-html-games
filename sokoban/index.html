<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Sokoban</title>
    <link rel="stylesheet" href="src/styles.css">
  </head>
  <body>
    <main class="game-shell">
      <header class="topbar">
        <div class="topbar-copy">
          <span class="eyebrow">Puzzle</span>
          <strong class="title">Sokoban</strong>
        </div>
        <button id="restart" type="button">Restart</button>
      </header>

      <section class="playfield" aria-label="Game area">
        <header class="hud" aria-label="Game status">
          <div class="stat-card">
            <span class="label">Level</span>
            <strong id="level">1</strong>
          </div>
          <div class="stat-card">
            <span class="label">Moves</span>
            <strong id="moves">0</strong>
          </div>
          <div class="stat-card">
            <span class="label">Pushes</span>
            <strong id="pushes">0</strong>
          </div>
          <div class="status-wrap">
            <span class="label">Status</span>
            <strong id="status">Playing</strong>
          </div>
        </header>

        <div class="board-wrap">
          <canvas id="game" aria-label="Sokoban board"></canvas>
        </div>
      </section>

      <section class="touch-controls" aria-label="Touch controls">
        <div class="dpad" aria-label="Directional controls">
          <button type="button" class="dpad-btn dpad-up" data-action="up" aria-label="Move up">▲</button>
          <button type="button" class="dpad-btn dpad-left" data-action="left" aria-label="Move left">◀</button>
          <button type="button" class="dpad-btn dpad-right" data-action="right" aria-label="Move right">▶</button>
          <button type="button" class="dpad-btn dpad-down" data-action="down" aria-label="Move down">▼</button>
        </div>
        <div class="side-controls">
          <button type="button" id="undo-btn" data-action="undo" aria-label="Undo last move">Undo</button>
        </div>
      </section>
    </main>
    <script src="src/game.js"></script>
  </body>
</html>
